<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐝 Ong Vàng - Kiểm Tra Trực Tuyến</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g50:#ECFDF5;--g100:#D1FAE5;--g200:#A7F3D0;--g300:#6EE7B7;--g400:#34D399;--g500:#10B981;--g600:#059669;--g700:#047857;--g800:#065F46;--t50:#F0FDFA;--t100:#CCFBF1;--t200:#99F6E4;--t400:#2DD4BF;--t500:#14B8A6;--t600:#0D9488;--s50:#F0F9FF;--s100:#E0F2FE;--s400:#38BDF8;--s500:#0EA5E9;--a50:#FFFBEB;--a200:#FDE68A;--a400:#FBBF24;--a600:#D97706;--r50:#FFF1F2;--r100:#FCE7F3;--r400:#FB7185;--r500:#F43F5E;--x50:#F9FAFB;--x100:#F3F4F6;--x200:#E5E7EB;--x400:#9CA3AF;--x500:#6B7280;--x700:#374151;--x800:#1F2937;--fd:'Montserrat',sans-serif;--fb:'Quicksand',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--fb);}body{min-height:100vh;background:linear-gradient(160deg,var(--g50),var(--t50),var(--s50));}
h1,h2,h3,.hd{font-family:var(--fd);font-weight:800;}button{cursor:pointer;border:none;outline:none;}textarea,input,select{outline:none;font-family:var(--fb);}
::-webkit-scrollbar{width:7px;}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--t400),var(--g500));border-radius:99px;}
@keyframes floatBee{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes starPop{0%{transform:scale(0) rotate(-45deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes progressStripe{0%{background-position:0 0}100%{background-position:40px 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.3)}50%{box-shadow:0 0 20px rgba(16,185,129,.5)}}
@keyframes selectPop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.deco{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}.deco>div{position:absolute;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;}
.card{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.08);max-width:500px;width:100%;padding:32px;text-align:center;z-index:10;border:3px solid var(--g300);animation:slideUp .6s ease-out;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{border-radius:16px;padding:14px 10px;border:2px solid;}
.stat-num{font-size:28px;font-weight:800;font-family:var(--fd);}
.stat-label{font-size:11px;font-weight:700;}
.btn-main{width:100%;padding:16px;border-radius:16px;font-size:20px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,var(--g500),var(--t500));box-shadow:0 8px 24px rgba(16,185,129,.35);transition:all .2s;}
.btn-main:hover{box-shadow:0 12px 32px rgba(16,185,129,.45);transform:translateY(-1px);}
.btn-main:disabled{opacity:.6;}
.input-field{width:100%;padding:14px 16px;border:3px solid var(--g200);border-radius:14px;font-size:16px;font-weight:600;color:var(--x800);transition:all .2s;margin-bottom:12px;}
.input-field:focus{border-color:var(--g400);background:var(--g50);}
.code-input{width:100%;padding:20px;border:4px solid var(--g300);border-radius:18px;font-size:32px;font-weight:900;color:var(--g700);text-align:center;letter-spacing:8px;font-family:var(--fd);text-transform:uppercase;transition:all .3s;margin-bottom:16px;}
.code-input:focus{border-color:var(--g500);background:var(--g50);box-shadow:0 0 20px rgba(16,185,129,.2);}
.code-input::placeholder{font-size:18px;letter-spacing:2px;color:var(--x400);font-weight:600;}
.room-info{padding:14px;background:var(--g50);border-radius:14px;border:2px solid var(--g200);margin-bottom:16px;animation:fadeIn .3s;}
.exam-hdr{position:sticky;top:0;z-index:30;padding:12px 16px;background:linear-gradient(90deg,var(--g50),var(--t50),var(--g50));border-bottom:3px solid var(--g300);backdrop-filter:blur(8px);}
.hdr-inner{max-width:800px;margin:0 auto;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.timer-box{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:14px;font-family:monospace;font-weight:800;font-size:18px;border:2px solid;}
.timer-ok{background:var(--g50);border-color:var(--g300);color:var(--g600);}
.timer-warn{background:var(--a50);border-color:var(--a200);color:var(--a600);}
.timer-danger{background:var(--r50);border-color:var(--r400);color:var(--r500);}
.prog-wrap{position:relative;height:22px;border-radius:99px;background:var(--g100);border:2px solid var(--g200);overflow:visible;}
.prog-fill{height:100%;border-radius:99px;transition:width .7s;background:repeating-linear-gradient(90deg,var(--g400),var(--g400) 10px,var(--t400) 10px,var(--t400) 20px);background-size:40px 100%;animation:progressStripe 1s linear infinite;}
.prog-bee{position:absolute;top:50%;transform:translateY(-50%);transition:left .7s;}
.exam-body{max-width:800px;margin:0 auto;padding:16px 16px 100px;position:relative;z-index:10;}
.section-title{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--g800);margin:24px 0 12px;display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,255,255,.7);border-radius:14px;border-left:5px solid var(--g400);}
.qcard{background:rgba(255,255,255,.92);border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.04);margin-bottom:14px;border:2px solid var(--g200);transition:all .3s;overflow:hidden;}
.qcard.active{border-color:var(--g400);box-shadow:0 4px 24px rgba(16,185,129,.12);animation:glow 2s ease-in-out infinite;}
.qcard.submitted{border-color:var(--g300);background:var(--g50);}
.qcard-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-right:4px;}
.badge-tn{background:var(--t100);color:var(--t600);}.badge-tl{background:var(--r100);color:var(--r500);}
.badge-pts{background:var(--g100);color:var(--g700);border:1px solid var(--g200);}
.badge-sub{background:var(--s100);color:var(--s500);font-size:10px;}
.badge-done{background:var(--g400);color:white;font-size:11px;}
.qcard-qtext{padding:0 20px;font-family:var(--fd);font-size:20px;font-weight:700;line-height:1.5;color:var(--x800);}
.qcard-qtext .fill-input{display:inline-block;width:100px;margin:0 4px;padding:4px 10px;text-align:center;border:none;border-bottom:4px solid var(--g300);border-radius:10px;font-size:18px;font-weight:800;color:var(--g700);background:var(--g50);font-family:var(--fd);}
.qcard-qtext .fill-input:focus{border-bottom-color:var(--g500);background:var(--g100);}
.qcard-answer{padding:12px 20px 20px;display:none;}
.qcard.active .qcard-answer{display:block;animation:fadeIn .3s ease-out;}
.options-list{display:flex;flex-direction:column;gap:10px;}
.opt-btn{width:100%;text-align:left;padding:14px;border-radius:14px;border:3px solid var(--x200);background:var(--x50);font-size:16px;font-weight:600;display:flex;align-items:center;gap:12px;transition:all .2s;color:var(--x700);}
.opt-btn:hover{border-color:var(--g300);background:var(--g50);}
.opt-btn.selected{border-color:var(--g400);background:var(--g50);color:var(--g700);animation:selectPop .4s ease;}
.opt-label{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:white;flex-shrink:0;}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tf-btn{padding:16px;border-radius:14px;border:3px solid var(--x200);font-size:18px;font-weight:800;text-align:center;background:var(--x50);color:var(--x700);}
.tf-btn:hover{border-color:var(--g300);background:var(--g50);}
.tf-btn.sel-t{border-color:var(--g400);background:var(--g50);color:var(--g600);}
.tf-btn.sel-f{border-color:var(--r400);background:var(--r50);color:var(--r500);}
.essay-textarea{width:100%;height:140px;padding:14px;border:3px solid var(--x200);border-radius:14px;font-size:16px;resize:none;font-weight:600;color:var(--x800);}
.essay-textarea:focus{border-color:var(--g400);background:var(--g50);}
.btn-upload{margin-top:10px;width:100%;padding:14px;border-radius:14px;border:3px dashed var(--g300);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--g50);color:var(--g700);}
.btn-upload.uploaded{border-color:var(--t400);background:var(--t50);color:var(--t600);border-style:solid;}
.btn-do{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--g500),var(--t500));}
.btn-submit-q{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--g600),var(--g700));}
.btn-submitted{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:var(--g600);background:var(--g100);border:2px solid var(--g300);}
.submit-bar{position:fixed;bottom:0;left:0;right:0;z-index:35;padding:12px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:3px solid var(--g300);display:flex;align-items:center;justify-content:center;gap:16px;}
.btn-submit-all{padding:14px 32px;border-radius:14px;font-size:17px;font-weight:800;color:white;background:linear-gradient(135deg,var(--g500),var(--g600));}
.score-num{font-size:48px;font-weight:800;font-family:var(--fd);color:var(--g700);}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.hidden{display:none !important;}.spinner{animation:spin 1s linear infinite;display:inline-block;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;padding:14px 28px;border-radius:14px;background:var(--g500);color:white;font-weight:800;font-size:15px;box-shadow:0 8px 30px rgba(16,185,129,.4);animation:slideUp .4s ease-out;}
</style>
</head>
<body>
<div class="deco"><div style="top:10px;left:8px;animation:floatBee 4s ease-in-out infinite" id="d1"></div><div style="top:200px;right:40px;animation:floatBee 5s ease-in-out infinite 1s" id="d2"></div><div style="bottom:100px;left:30px;animation:floatBee 6s ease-in-out infinite 2s" id="d3"></div><div style="top:60px;left:20%;font-size:40px;opacity:.12">☁️</div><div style="bottom:40px;left:40%;font-size:20px;opacity:.4">🌼</div></div>
<div id="app"></div>
<div class="confetti-c hidden" id="confetti-c"></div>
<div id="toast" class="toast hidden"></div>
<script>
const API='https://script.google.com/macros/s/AKfycbyt6623ltT0g86V_cIxqFmtSAfCnVqKNq1O5Li5klICguuFtF_yEzcfIP-X3fvMVaI1/exec';
function B(sz){return`<svg width="${sz}" height="${sz}" viewBox="0 0 140 200" xmlns="http://www.w3.org/2000/svg"><ellipse cx="25" cy="85" rx="30" ry="18" fill="#B3E5FC" opacity=".5" transform="rotate(-25 25 85)"/><ellipse cx="115" cy="85" rx="30" ry="18" fill="#B3E5FC" opacity=".5" transform="rotate(25 115 85)"/><ellipse cx="70" cy="135" rx="30" ry="38" fill="#FFD93D"/><ellipse cx="70" cy="128" rx="28" ry="8" fill="#1a1a2e" opacity=".22"/><ellipse cx="70" cy="148" rx="29" ry="8" fill="#1a1a2e" opacity=".22"/><ellipse cx="70" cy="168" rx="27" ry="8" fill="#1a1a2e" opacity=".22"/><ellipse cx="70" cy="75" rx="32" ry="30" fill="#FFD93D"/><path d="M38 65 Q42 45 70 38 Q98 45 102 65 Q94 57 70 55 Q46 57 38 65Z" fill="#1a1a2e"/><ellipse cx="56" cy="72" rx="10" ry="11" fill="white"/><ellipse cx="84" cy="72" rx="10" ry="11" fill="white"/><circle cx="58" cy="72" r="7" fill="#2563EB"/><circle cx="86" cy="72" r="7" fill="#2563EB"/><circle cx="55" cy="68" r="3" fill="white"/><circle cx="83" cy="68" r="3" fill="white"/><path d="M50 88 Q60 100 70 98 Q80 100 90 88" stroke="#1a1a2e" stroke-width="2" fill="#FF6B8A"/><ellipse cx="38" cy="84" rx="7" ry="4" fill="#FF9999" opacity=".3"/><ellipse cx="102" cy="84" rx="7" ry="4" fill="#FF9999" opacity=".3"/><path d="M56 42 Q48 22 40 14" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M84 42 Q92 22 100 14" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="38" cy="12" r="5" fill="#FFD93D"/><circle cx="102" cy="12" r="5" fill="#FFD93D"/></svg>`;}
function BC(sz){return`<svg width="${sz}" height="${sz}" viewBox="0 0 160 250" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="100" rx="38" ry="24" fill="#B3E5FC" opacity=".45" transform="rotate(-20 30 100)"/><ellipse cx="110" cy="100" rx="38" ry="24" fill="#B3E5FC" opacity=".45" transform="rotate(20 110 100)"/><ellipse cx="70" cy="155" rx="36" ry="44" fill="#FFD93D"/><ellipse cx="70" cy="148" rx="34" ry="10" fill="#1a1a2e" opacity=".2"/><ellipse cx="70" cy="168" rx="35" ry="10" fill="#1a1a2e" opacity=".2"/><ellipse cx="70" cy="188" rx="33" ry="10" fill="#1a1a2e" opacity=".2"/><ellipse cx="70" cy="85" rx="38" ry="35" fill="#FFD93D"/><path d="M32 75 Q35 48 70 42 Q105 48 108 75 Q100 65 70 63 Q40 65 32 75Z" fill="#1a1a2e"/><ellipse cx="54" cy="82" rx="12" ry="13" fill="white"/><ellipse cx="86" cy="82" rx="12" ry="13" fill="white"/><circle cx="56" cy="82" r="8" fill="#2563EB"/><circle cx="88" cy="82" r="8" fill="#2563EB"/><circle cx="53" cy="78" r="3.5" fill="white"/><circle cx="85" cy="78" r="3.5" fill="white"/><path d="M50 98 Q60 112 70 110 Q80 112 90 98" stroke="#1a1a2e" stroke-width="2" fill="#FF6B8A"/><ellipse cx="38" cy="94" rx="8" ry="5" fill="#FF9999" opacity=".35"/><ellipse cx="102" cy="94" rx="8" ry="5" fill="#FF9999" opacity=".35"/><path d="M58 52 Q50 30 40 22" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M82 52 Q90 30 100 22" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="38" cy="20" r="6" fill="#FFD93D"/><circle cx="102" cy="20" r="6" fill="#FFD93D"/><path d="M36 130 Q15 118 5 105" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="3" cy="103" r="5" fill="#FFD93D"/><path d="M104 130 Q125 118 135 105" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="137" cy="103" r="5" fill="#FFD93D"/><path d="M55 195 Q52 215 48 225" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M85 195 Q88 215 92 225" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/><ellipse cx="46" cy="228" rx="8" ry="4" fill="#1a1a2e"/><ellipse cx="94" cy="228" rx="8" ry="4" fill="#1a1a2e"/></svg>`;}
function fmt(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');setTimeout(function(){t.classList.add('hidden');},3500);}
function fireConfetti(){var c=document.getElementById('confetti-c');c.classList.remove('hidden');c.innerHTML='';var cols=['#10B981','#14B8A6','#0EA5E9','#FBBF24','#F43F5E','#A78BFA','#34D399'];for(var i=0;i<80;i++){var p=document.createElement('div');var sz=6+Math.random()*10;Object.assign(p.style,{position:'absolute',left:Math.random()*100+'%',top:(-10-Math.random()*20)+'%',width:sz+'px',height:(Math.random()>.5?sz*.6:sz)+'px',backgroundColor:cols[i%cols.length],borderRadius:['50%','3px','2px'][Math.floor(Math.random()*3)],animation:'confettiFall '+(2+Math.random()*2.5)+'s ease-in '+(Math.random()*2.5)+'s forwards'});c.appendChild(p);}setTimeout(function(){c.classList.add('hidden');},6000);}
document.getElementById('d1').innerHTML=B(34);document.getElementById('d2').innerHTML=B(22);document.getElementById('d3').innerHTML=B(26);

var S={phase:'enterCode',roomCode:'',roomInfo:null,student:{maHS:'',hoTen:'',lop:''},exam:null,config:null,answers:{},essayTexts:{},essayImages:{},qState:{},timeLeft:2400,scores:{tn:0,tnTotal:0},timer:null};

function render(){var el=document.getElementById('app');
if(S.phase==='enterCode')renderEnterCode(el);
else if(S.phase==='login')renderLogin(el);
else if(S.phase==='loading')el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 2s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:16px">'+B(60)+'</div><p style="font-size:18px;font-weight:800;color:var(--g700)"><span class="spinner">⏳</span> Đang tải đề thi...</p></div></div>';
else if(S.phase==='lobby')renderLobby(el);
else if(S.phase==='exam')renderExam(el);
else if(S.phase==='submitting')el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 2s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:16px">'+B(60)+'</div><p style="font-size:18px;font-weight:800;color:var(--g700)"><span class="spinner">⏳</span> Đang nộp bài...</p></div></div>';
else if(S.phase==='result')renderResult(el);}

// ═══ STEP 1: Enter Room Code ═══
function renderEnterCode(el){
  el.innerHTML='<div class="wrap"><div class="card">'+
    '<div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:8px">'+BC(100)+'</div>'+
    '<h1 class="hd" style="font-size:24px;color:var(--g800);margin-bottom:4px">Kiểm Tra Trực Tuyến</h1>'+
    '<p style="font-size:14px;font-weight:700;color:var(--g600);margin-bottom:20px">🐝 Ong vàng cùng em làm bài nhé!</p>'+
    '<p style="font-size:13px;font-weight:700;color:var(--x500);margin-bottom:8px">Nhập mã phòng thi do cô giáo cung cấp:</p>'+
    '<input class="code-input" id="f-code" placeholder="ONG-0000" maxlength="8" value="'+S.roomCode+'" onkeyup="if(event.key===\'Enter\')checkCode()">'+
    (S.roomInfo?'<div class="room-info"><p style="font-size:15px;font-weight:800;color:var(--g700)">✅ '+S.roomInfo.examTitle+'</p><p style="font-size:13px;font-weight:600;color:var(--g600)">🏫 '+S.roomInfo.schoolName+' — '+S.roomInfo.teacher+'</p></div>':'')+
    '<button class="btn-main" onclick="checkCode()" style="margin-bottom:12px">🔍 Kiểm tra mã phòng</button>'+
    (S.roomInfo?'<button class="btn-main" onclick="S.phase=\'login\';render();" style="background:linear-gradient(135deg,var(--g600),var(--t600))">🚀 Tiếp tục nhập thông tin</button>':'')+
  '</div></div>';
}

function checkCode(){
  var code=document.getElementById('f-code').value.trim().toUpperCase();
  if(!code){showToast('⚠️ Nhập mã phòng thi!');return;}
  S.roomCode=code;
  showToast('🔍 Đang kiểm tra...');
  fetch(API+'?action=checkCode&code='+encodeURIComponent(code))
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.valid){S.roomInfo=data;showToast('✅ Tìm thấy phòng thi!');}
      else{S.roomInfo=null;showToast('❌ '+(data.error||'Mã không hợp lệ'));}
      render();
    }).catch(function(err){showToast('⚠️ Lỗi: '+err.message);});
}

// ═══ STEP 2: Login ═══
function renderLogin(el){
  el.innerHTML='<div class="wrap"><div class="card">'+
    '<div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:8px">'+B(60)+'</div>'+
    '<div style="padding:10px 14px;background:var(--g50);border-radius:12px;border:2px solid var(--g200);margin-bottom:16px"><p style="font-size:14px;font-weight:800;color:var(--g700)">🏫 '+S.roomInfo.schoolName+'</p><p style="font-size:13px;font-weight:600;color:var(--g600)">Mã phòng: <span style="font-family:var(--fd);font-size:16px;color:var(--g800)">'+S.roomCode+'</span></p></div>'+
    '<p style="font-size:13px;font-weight:700;color:var(--x500);margin-bottom:8px">Nhập thông tin của em:</p>'+
    '<input class="input-field" id="f-ma" placeholder="Mã học sinh (VD: HS001)" value="'+S.student.maHS+'">'+
    '<input class="input-field" id="f-ten" placeholder="Họ và tên" value="'+S.student.hoTen+'">'+
    '<input class="input-field" id="f-lop" placeholder="Lớp (VD: 3A)" value="'+S.student.lop+'">'+
    '<button class="btn-main" onclick="doLogin()">🚀 Vào phòng thi</button>'+
    '<button style="margin-top:8px;padding:10px;border-radius:10px;font-weight:700;color:var(--x500);background:var(--x100);width:100%" onclick="S.phase=\'enterCode\';render();">← Đổi mã phòng</button>'+
  '</div></div>';
}

function doLogin(){
  var ma=document.getElementById('f-ma').value.trim();
  var ten=document.getElementById('f-ten').value.trim();
  var lop=document.getElementById('f-lop').value.trim();
  if(!ma||!ten){showToast('⚠️ Nhập Mã HS và Họ tên!');return;}
  S.student={maHS:ma,hoTen:ten,lop:lop};
  S.phase='loading';render();
  fetch(API+'?action=getExam&code='+encodeURIComponent(S.roomCode))
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error){showToast('❌ '+data.error);S.phase='enterCode';render();return;}
      S.exam=data.exam;S.config=data.config||{};S.timeLeft=(S.config.duration||2400);S.phase='lobby';render();
    }).catch(function(err){showToast('⚠️ '+err.message);S.phase='enterCode';render();});
}

// ═══ LOBBY ═══
function renderLobby(el){
  var qs=S.exam.questions;var tnC=qs.filter(function(q){return q.cat==='tn';}).length;var tlC=qs.filter(function(q){return q.cat==='tl';}).length;
  el.innerHTML='<div class="wrap"><div class="card">'+
    '<div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:6px">'+BC(90)+'</div>'+
    '<div style="font-size:13px;font-weight:700;color:var(--g600);text-transform:uppercase">'+(S.config.schoolName||'')+'</div>'+
    '<h1 class="hd" style="font-size:22px;color:var(--g800);margin-bottom:4px;line-height:1.3">'+(S.exam.title||'Bài Kiểm Tra')+'</h1>'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
      '<span style="font-size:12px;font-weight:800;color:var(--g700);background:var(--g100);padding:4px 12px;border-radius:99px;border:2px solid var(--g300);font-family:var(--fd)">'+S.roomCode+'</span>'+
      '<span style="font-size:12px;font-weight:700;color:var(--g700);background:var(--g50);padding:4px 12px;border-radius:99px;border:1px solid var(--g200)">🧒 '+S.student.hoTen+'</span></div>'+
    '<div class="stat-grid">'+
      '<div class="stat-card" style="background:var(--t50);border-color:var(--t200)"><div style="font-size:22px">📋</div><div class="stat-num" style="color:var(--t600)">'+tnC+'</div><div class="stat-label" style="color:var(--t600)">Trắc nghiệm</div></div>'+
      '<div class="stat-card" style="background:var(--r50);border-color:var(--r100)"><div style="font-size:22px">📝</div><div class="stat-num" style="color:var(--r500)">'+tlC+'</div><div class="stat-label" style="color:var(--r500)">Tự luận</div></div>'+
      '<div class="stat-card" style="background:var(--g50);border-color:var(--g200)"><div style="font-size:22px">⏰</div><div class="stat-num" style="color:var(--g700)">'+Math.floor((S.config.duration||2400)/60)+'</div><div class="stat-label" style="color:var(--g700)">Phút</div></div></div>'+
    '<button class="btn-main" onclick="startExam()" style="animation:pulse2 2s ease-in-out infinite">🚀 Bắt Đầu Làm Bài!</button>'+
    '<p style="font-size:12px;margin-top:10px;font-weight:700;color:var(--g700)">🐝 Ong vàng cùng em làm bài nhé!</p>'+
  '</div></div>';
}

// ═══ EXAM ═══
function startExam(){S.phase='exam';S.timeLeft=S.config.duration||2400;S.exam.questions.forEach(function(q){S.qState[q.id]='locked';});
S.timer=setInterval(function(){S.timeLeft--;if(S.timeLeft<=0){clearInterval(S.timer);submitAll();}else{var el=document.getElementById('td');if(el)el.textContent=fmt(S.timeLeft);var b=document.getElementById('tb');if(b)b.className='timer-box '+(S.timeLeft<60?'timer-danger':S.timeLeft<300?'timer-warn':'timer-ok');}},1000);render();}
function submittedCount(){return S.exam.questions.filter(function(q){return S.qState[q.id]==='submitted';}).length;}
function activateQ(id){S.qState[id]='active';render();setTimeout(function(){var e=document.getElementById('qc-'+id);if(e)e.scrollIntoView({behavior:'smooth',block:'center'});},100);}
function submitQ(id){S.qState[id]='submitted';render();}
function submitAll(){clearInterval(S.timer);S.exam.questions.forEach(function(q){S.qState[q.id]='submitted';});S.phase='submitting';render();
fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'submitExam',roomCode:S.roomCode,maHS:S.student.maHS,hoTen:S.student.hoTen,lop:S.student.lop,answers:S.answers,essayTexts:S.essayTexts})})
.then(function(r){return r.json();}).then(function(d){S.scores.tn=d.tnScore||0;S.scores.tnTotal=d.tnTotal||0;S.scores.details=d.details||[];S.phase='result';render();fireConfetti();})
.catch(function(err){S.scores.tn=0;S.scores.tnTotal=0;S.phase='result';render();fireConfetti();showToast('⚠️ '+err.message);});}

function renderExam(el){var qs=S.exam.questions;var tnQs=qs.filter(function(q){return q.cat==='tn';});var tlQs=qs.filter(function(q){return q.cat==='tl';});
var pct=(submittedCount()/qs.length)*100;var tc=S.timeLeft<60?'timer-danger':S.timeLeft<300?'timer-warn':'timer-ok';
var h='<div style="min-height:100vh;background:linear-gradient(180deg,var(--g50),var(--t50))"><div class="exam-hdr"><div class="hdr-inner"><div class="hdr-top"><div style="display:flex;align-items:center;gap:8px"><div style="animation:wiggle 2s ease-in-out infinite">'+B(26)+'</div><span class="hd" style="font-size:13px;color:var(--g800)">'+(S.exam.title||'')+'</span><span style="font-size:10px;font-weight:800;color:var(--g600);background:var(--g100);padding:2px 8px;border-radius:6px;font-family:var(--fd)">'+S.roomCode+'</span></div><div id="tb" class="timer-box '+tc+'">🕐 <span id="td">'+fmt(S.timeLeft)+'</span></div></div><div class="prog-wrap"><div class="prog-fill" style="width:'+Math.max(pct,3)+'%"></div><div class="prog-bee" style="left:calc('+Math.min(pct,93)+'% - 12px)">'+B(22)+'</div></div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:12px;font-weight:700;color:var(--g700)">🌻 '+submittedCount()+'/'+qs.length+'</span><span style="font-size:12px;font-weight:700;color:var(--g700)">🧒 '+S.student.hoTen+'</span></div></div></div><div class="exam-body">';
if(tnQs.length){h+='<div class="section-title">📋 Phần Trắc Nghiệm</div>';tnQs.forEach(function(q){h+=renderQ(q);});}
if(tlQs.length){h+='<div class="section-title">📝 Phần Tự Luận</div>';tlQs.forEach(function(q){h+=renderQ(q);});}
h+='</div><div class="submit-bar"><span style="font-size:14px;font-weight:700;color:var(--g700)">✅ '+submittedCount()+'/'+qs.length+'</span><button class="btn-submit-all" onclick="submitAll()">📨 Nộp Toàn Bộ Bài</button></div></div>';el.innerHTML=h;}

function renderQ(q){var st=S.qState[q.id]||'locked';var isTN=q.cat==='tn';var subL={mcq:'Chọn đáp án',true_false:'Đúng/Sai',fill_in:'Điền kết quả',essay:'Tự luận'};
var cls='qcard';if(st==='active')cls+=' active';if(st==='submitted')cls+=' submitted';
var c='<div class="'+cls+'" id="qc-'+q.id+'"><div class="qcard-header"><div><span class="badge '+(isTN?'badge-tn':'badge-tl')+'">'+(isTN?'📋 TN':'📝 TL')+' '+q.order+'</span><span class="badge badge-sub">'+(subL[q.type]||'')+'</span><span class="badge badge-pts">⭐ '+q.points+'đ</span>'+(st==='submitted'?'<span class="badge badge-done">✓ Đã nộp</span>':'')+'</div>';
if(st==='locked')c+='<button class="btn-do" onclick="activateQ(\''+q.id+'\')">📖 Bắt đầu làm</button>';
else if(st==='active')c+='<button class="btn-submit-q" onclick="submitQ(\''+q.id+'\')">📨 Nộp câu này</button>';
else c+='<button class="btn-submitted" onclick="activateQ(\''+q.id+'\')">✏️ Sửa lại</button>';
c+='</div>';
if(q.type==='fill_in'&&st==='active'){var parts=q.content.split('_____');var val=S.answers[q.id]||'';
c+='<div class="qcard-qtext">'+parts.map(function(p,i){if(i<parts.length-1)return p+'<input type="text" class="fill-input" value="'+val+'" placeholder="?" oninput="S.answers[\''+q.id+'\']=this.value">';return p;}).join('')+'</div>';
}else{c+='<div class="qcard-qtext">'+q.content+'</div>';}
c+='<div class="qcard-answer">';
if(q.type==='mcq'&&q.options){var lbl=['A','B','C','D'],cols=['#0D9488','#10B981','#0EA5E9','#F59E0B'];
c+='<div class="options-list">'+q.options.map(function(o,i){var sel=S.answers[q.id]===o.id;return'<button class="opt-btn '+(sel?'selected':'')+'" onclick="S.answers[\''+q.id+'\']=\''+o.id+'\';render();"><span class="opt-label" style="background:'+(sel?cols[i]:'var(--x400)')+'">'+lbl[i]+'</span><span style="color:'+(sel?cols[i]:'var(--x700)')+'">'+o.text+'</span>'+(sel?'<span style="margin-left:auto;color:var(--g500);font-weight:800">✓</span>':'')+'</button>';}).join('')+'</div>';}
if(q.type==='true_false'){var sT=S.answers[q.id]==='true',sF=S.answers[q.id]==='false';
c+='<div class="tf-btns"><button class="tf-btn '+(sT?'sel-t':'')+'" onclick="S.answers[\''+q.id+'\']=\'true\';render();">✅ Đúng</button><button class="tf-btn '+(sF?'sel-f':'')+'" onclick="S.answers[\''+q.id+'\']=\'false\';render();">❌ Sai</button></div>';}
if(q.type==='essay'){c+='<textarea class="essay-textarea" placeholder="✍️ Nhập bài làm..." oninput="S.essayTexts[\''+q.id+'\']=this.value">'+(S.essayTexts[q.id]||'')+'</textarea>';
var up=S.essayImages[q.id];c+='<button class="btn-upload '+(up?'uploaded':'')+'" onclick="S.essayImages[\''+q.id+'\']=true;render();">'+(up?'✅ Đã tải ảnh!':'📸 Tải ảnh chụp bài làm nếu ghi trên giấy')+'</button>';}
c+='</div></div>';return c;}

// ═══ RESULT ═══
function renderResult(el){var pct=S.scores.tnTotal?Math.round((S.scores.tn/S.scores.tnTotal)*100):0;var stars=pct>=80?3:pct>=50?2:1;
el.innerHTML='<div class="wrap"><div class="card" style="animation:bounceIn .8s ease-out">'+
'<div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:6px">'+BC(80)+'</div>'+
'<h2 class="hd" style="font-size:26px;color:var(--g800);margin-bottom:4px">Nộp bài thành công!</h2>'+
'<p style="font-weight:700;color:var(--g700);margin-bottom:16px">🎉 '+S.student.hoTen+' đã hoàn thành!</p>'+
'<div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px">'+[1,2,3].map(function(i){return'<span style="font-size:48px;'+(i<=stars?'animation:starPop .5s ease '+i*.2+'s both':'opacity:.2')+'">⭐</span>';}).join('')+'</div>'+
'<div style="border-radius:16px;padding:20px;margin-bottom:12px;background:linear-gradient(135deg,var(--g50),var(--t50));border:2px solid var(--g200)"><div style="font-size:13px;font-weight:700;color:var(--g700)">Điểm Trắc nghiệm</div><div class="score-num">'+S.scores.tn+'/'+S.scores.tnTotal+'</div></div>'+
(S.scores.details&&S.scores.details.length?'<div style="margin-bottom:12px;padding:12px;background:var(--g50);border-radius:12px;border:1px solid var(--g200);text-align:left"><p style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:4px">Chi tiết:</p><p style="font-size:13px;font-weight:600;color:var(--x700)">'+S.scores.details.join(' | ')+'</p></div>':'')+
'<div style="border-radius:16px;padding:14px;margin-bottom:20px;background:var(--t50);border:2px solid var(--t200)"><p style="font-size:14px;font-weight:700;color:var(--t600)">📝 Phần tự luận sẽ được cô giáo chấm sau</p></div>'+
'<button class="btn-main" onclick="location.reload()" style="background:var(--g100);color:var(--g700)">🏠 Quay về</button>'+
'</div></div>';}

render();
</script>
</body>
</html>
