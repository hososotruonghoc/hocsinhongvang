<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐝 Ong Vàng - Kiểm Tra Trực Tuyến</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g50:#ECFDF5;--g100:#D1FAE5;--g200:#A7F3D0;--g300:#6EE7B7;--g400:#34D399;--g500:#10B981;--g600:#059669;--g700:#047857;--g800:#065F46;--t50:#F0FDFA;--t100:#CCFBF1;--t200:#99F6E4;--t400:#2DD4BF;--t500:#14B8A6;--t600:#0D9488;--s50:#F0F9FF;--s100:#E0F2FE;--s400:#38BDF8;--s500:#0EA5E9;--a50:#FFFBEB;--a200:#FDE68A;--a400:#FBBF24;--a600:#D97706;--r50:#FFF1F2;--r100:#FCE7F3;--r400:#FB7185;--r500:#F43F5E;--x50:#F9FAFB;--x100:#F3F4F6;--x200:#E5E7EB;--x400:#9CA3AF;--x500:#6B7280;--x700:#374151;--x800:#1F2937;--fd:'Montserrat',sans-serif;--fb:'Quicksand',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--fb);}body{min-height:100vh;background:linear-gradient(160deg,var(--g50),var(--t50),var(--s50));}
h1,h2,.hd{font-family:var(--fd);font-weight:800;}button{cursor:pointer;border:none;outline:none;}textarea,input,select{outline:none;font-family:var(--fb);}
@keyframes floatBee{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes starPop{0%{transform:scale(0) rotate(-45deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes progressStripe{0%{background-position:0 0}100%{background-position:40px 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.3)}50%{box-shadow:0 0 20px rgba(16,185,129,.5)}}
@keyframes selectPop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;}
.card{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.08);max-width:500px;width:100%;padding:32px;text-align:center;z-index:10;border:3px solid var(--g300);animation:slideUp .6s ease-out;}
.btn-main{width:100%;padding:16px;border-radius:16px;font-size:18px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--g500),var(--t500));box-shadow:0 8px 24px rgba(16,185,129,.35);transition:all .2s;}
.btn-main:hover{transform:translateY(-1px);}
.input-field{width:100%;padding:14px;border:3px solid var(--g200);border-radius:14px;font-size:16px;font-weight:600;color:var(--x800);margin-bottom:12px;}
.input-field:focus{border-color:var(--g400);background:var(--g50);}
.code-input{width:100%;padding:18px;border:4px solid var(--g300);border-radius:18px;font-size:28px;font-weight:900;color:var(--g700);text-align:center;letter-spacing:6px;font-family:var(--fd);text-transform:uppercase;margin-bottom:16px;}
.code-input:focus{border-color:var(--g500);background:var(--g50);}
.code-input::placeholder{font-size:16px;letter-spacing:2px;color:var(--x400);font-weight:600;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{border-radius:16px;padding:14px 10px;border:2px solid;}
.stat-num{font-size:28px;font-weight:800;font-family:var(--fd);}
.stat-label{font-size:11px;font-weight:700;}
.exam-hdr{position:sticky;top:0;z-index:30;padding:12px 16px;background:linear-gradient(90deg,var(--g50),var(--t50),var(--g50));border-bottom:3px solid var(--g300);backdrop-filter:blur(8px);}
.timer-box{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:14px;font-family:monospace;font-weight:800;font-size:18px;border:2px solid;}
.timer-ok{background:var(--g50);border-color:var(--g300);color:var(--g600);}
.timer-warn{background:var(--a50);border-color:var(--a200);color:var(--a600);}
.timer-danger{background:var(--r50);border-color:var(--r400);color:var(--r500);}
.prog-wrap{position:relative;height:22px;border-radius:99px;background:var(--g100);border:2px solid var(--g200);overflow:visible;}
.prog-fill{height:100%;border-radius:99px;transition:width .7s;background:repeating-linear-gradient(90deg,var(--g400),var(--g400) 10px,var(--t400) 10px,var(--t400) 20px);background-size:40px 100%;animation:progressStripe 1s linear infinite;}
.prog-bee{position:absolute;top:50%;transform:translateY(-50%);transition:left .7s;}
.exam-body{max-width:800px;margin:0 auto;padding:16px 16px 100px;position:relative;z-index:10;}
.section-title{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--g800);margin:24px 0 12px;display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,255,255,.7);border-radius:14px;border-left:5px solid var(--g400);}
.qcard{background:rgba(255,255,255,.92);border-radius:20px;margin-bottom:14px;border:2px solid var(--g200);overflow:hidden;}
.qcard.active{border-color:var(--g400);animation:glow 2s ease-in-out infinite;}
.qcard.submitted{border-color:var(--g300);background:var(--g50);}
.qcard-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-right:4px;}
.badge-tn{background:var(--t100);color:var(--t600);}.badge-tl{background:var(--r100);color:var(--r500);}
.badge-pts{background:var(--g100);color:var(--g700);}.badge-done{background:var(--g400);color:white;font-size:11px;}
.qcard-qtext{padding:0 20px;font-family:var(--fd);font-size:18px;font-weight:700;line-height:1.5;color:var(--x800);}
.qcard-qtext .fill-input{display:inline-block;width:90px;margin:0 4px;padding:4px 8px;text-align:center;border:none;border-bottom:4px solid var(--g300);border-radius:10px;font-size:16px;font-weight:800;color:var(--g700);background:var(--g50);font-family:var(--fd);}
.qcard-answer{padding:12px 20px 20px;display:none;}
.qcard.active .qcard-answer{display:block;animation:fadeIn .3s ease-out;}
.opt-btn{width:100%;text-align:left;padding:14px;border-radius:14px;border:3px solid var(--x200);background:var(--x50);font-size:15px;font-weight:600;display:flex;align-items:center;gap:12px;margin-bottom:10px;color:var(--x700);}
.opt-btn:hover{border-color:var(--g300);background:var(--g50);}
.opt-btn.selected{border-color:var(--g400);background:var(--g50);color:var(--g700);animation:selectPop .4s ease;}
.opt-label{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:white;flex-shrink:0;}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tf-btn{padding:16px;border-radius:14px;border:3px solid var(--x200);font-size:18px;font-weight:800;text-align:center;background:var(--x50);color:var(--x700);}
.tf-btn.sel-t{border-color:var(--g400);background:var(--g50);color:var(--g600);}
.tf-btn.sel-f{border-color:var(--r400);background:var(--r50);color:var(--r500);}
.essay-textarea{width:100%;height:140px;padding:14px;border:3px solid var(--x200);border-radius:14px;font-size:16px;resize:none;font-weight:600;color:var(--x800);}
.essay-textarea:focus{border-color:var(--g400);background:var(--g50);}
.btn-do{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--g500),var(--t500));}
.btn-submit-q{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:white;background:linear-gradient(135deg,var(--g600),var(--g700));}
.btn-submitted{padding:10px 22px;border-radius:12px;font-weight:800;font-size:14px;color:var(--g600);background:var(--g100);border:2px solid var(--g300);}
.submit-bar{position:fixed;bottom:0;left:0;right:0;z-index:35;padding:12px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:3px solid var(--g300);display:flex;align-items:center;justify-content:center;gap:16px;}
.score-num{font-size:48px;font-weight:800;font-family:var(--fd);color:var(--g700);}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.hidden{display:none!important;}.spinner{animation:spin 1s linear infinite;display:inline-block;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;padding:14px 28px;border-radius:14px;background:var(--g500);color:white;font-weight:800;box-shadow:0 8px 30px rgba(16,185,129,.4);animation:slideUp .4s ease-out;}
.deco{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}.deco>div{position:absolute;}
</style>
</head>
<body>
<div class="deco"><div style="top:10px;left:8px;animation:floatBee 4s ease-in-out infinite" id="d1"></div><div style="top:200px;right:40px;animation:floatBee 5s ease-in-out infinite 1s" id="d2"></div><div style="bottom:100px;left:30px;animation:floatBee 6s ease-in-out infinite 2s" id="d3"></div><div style="top:60px;left:20%;font-size:40px;opacity:.12">☁️</div><div style="bottom:40px;left:40%;font-size:20px;opacity:.4">🌼</div></div>
<div id="app"></div><div class="confetti-c hidden" id="confetti-c"></div><div id="toast" class="toast hidden"></div>
<script>
var API='https://script.google.com/macros/s/AKfycbyt6623ltT0g86V_cIxqFmtSAfCnVqKNq1O5Li5klICguuFtF_yEzcfIP-X3fvMVaI1/exec';
function B(sz){return'<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 140 200"><ellipse cx="25" cy="85" rx="30" ry="18" fill="#B3E5FC" opacity=".5" transform="rotate(-25 25 85)"/><ellipse cx="115" cy="85" rx="30" ry="18" fill="#B3E5FC" opacity=".5" transform="rotate(25 115 85)"/><ellipse cx="70" cy="135" rx="30" ry="38" fill="#FFD93D"/><ellipse cx="70" cy="128" rx="28" ry="8" fill="#1a1a2e" opacity=".22"/><ellipse cx="70" cy="148" rx="29" ry="8" fill="#1a1a2e" opacity=".22"/><ellipse cx="70" cy="168" rx="27" ry="8" fill="#1a1a2e" opacity=".22"/><ellipse cx="70" cy="75" rx="32" ry="30" fill="#FFD93D"/><path d="M38 65Q42 45 70 38Q98 45 102 65Q94 57 70 55Q46 57 38 65Z" fill="#1a1a2e"/><ellipse cx="56" cy="72" rx="10" ry="11" fill="white"/><ellipse cx="84" cy="72" rx="10" ry="11" fill="white"/><circle cx="58" cy="72" r="7" fill="#2563EB"/><circle cx="86" cy="72" r="7" fill="#2563EB"/><circle cx="55" cy="68" r="3" fill="white"/><circle cx="83" cy="68" r="3" fill="white"/><path d="M50 88Q60 100 70 98Q80 100 90 88" stroke="#1a1a2e" stroke-width="2" fill="#FF6B8A"/><ellipse cx="38" cy="84" rx="7" ry="4" fill="#FF9999" opacity=".3"/><ellipse cx="102" cy="84" rx="7" ry="4" fill="#FF9999" opacity=".3"/><path d="M56 42Q48 22 40 14" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M84 42Q92 22 100 14" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="38" cy="12" r="5" fill="#FFD93D"/><circle cx="102" cy="12" r="5" fill="#FFD93D"/></svg>';}
function fmt(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');setTimeout(function(){t.classList.add('hidden');},3500);}
function fireConfetti(){var c=document.getElementById('confetti-c');c.classList.remove('hidden');c.innerHTML='';for(var i=0;i<60;i++){var p=document.createElement('div');var sz=6+Math.random()*8;Object.assign(p.style,{position:'absolute',left:Math.random()*100+'%',top:(-10-Math.random()*20)+'%',width:sz+'px',height:sz*.6+'px',backgroundColor:['#10B981','#14B8A6','#0EA5E9','#FBBF24','#F43F5E','#A78BFA'][i%6],borderRadius:Math.random()>.5?'50%':'2px',animation:'confettiFall '+(2+Math.random()*2)+'s ease-in '+(Math.random()*2)+'s forwards'});c.appendChild(p);}setTimeout(function(){c.classList.add('hidden');},6000);}
function renderFrac(t){if(!t)return'';return t.replace(/\{(\d+)\/(\d+)\}/g,function(m,a,b){return'<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;line-height:1"><span style="border-bottom:2px solid currentColor;padding:0 4px;font-size:85%">'+a+'</span><span style="padding:0 4px;font-size:85%">'+b+'</span></span>';});}
document.getElementById('d1').innerHTML=B(34);document.getElementById('d2').innerHTML=B(22);document.getElementById('d3').innerHTML=B(26);

var S={phase:'enterCode',roomCode:'',roomInfo:null,student:{maHS:'',hoTen:'',lop:''},exam:null,config:null,answers:{},essayTexts:{},qState:{},timeLeft:2400,scores:{tn:0,tnTotal:0},timer:null,scoreData:null};

function render(){var el=document.getElementById('app');
if(S.phase==='scoreCheck')renderScoreCheck(el);
else if(S.phase==='scoreResult')renderScoreResult(el);
else if(S.phase==='enterCode')renderEnterCode(el);
else if(S.phase==='login')renderLogin(el);
else if(S.phase==='loading'||S.phase==='submitting')el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 2s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:16px">'+B(60)+'</div><p style="font-size:18px;font-weight:800;color:var(--g700)"><span class="spinner">⏳</span> '+(S.phase==='loading'?'Đang tải đề thi...':'Đang nộp bài...')+'</p></div></div>';
else if(S.phase==='lobby')renderLobby(el);
else if(S.phase==='exam')renderExam(el);
else if(S.phase==='result')renderResult(el);}

function renderEnterCode(el){
  el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:8px">'+B(80)+'</div><h1 class="hd" style="font-size:24px;color:var(--g800);margin-bottom:4px">Kiểm Tra Trực Tuyến</h1><p style="font-size:14px;font-weight:700;color:var(--g600);margin-bottom:20px">🐝 Ong vàng cùng em làm bài nhé!</p><p style="font-size:13px;font-weight:700;color:var(--x500);margin-bottom:8px">Nhập mã phòng thi do cô giáo cung cấp:</p><input class="code-input" id="f-code" placeholder="ONG-0000" maxlength="8" value="'+S.roomCode+'" onkeyup="if(event.key===\'Enter\')checkCode()">'+(S.roomInfo?'<div style="padding:14px;background:var(--g50);border-radius:14px;border:2px solid var(--g200);margin-bottom:16px;animation:fadeIn .3s"><p style="font-size:15px;font-weight:800;color:var(--g700)">✅ '+S.roomInfo.examTitle+'</p><p style="font-size:13px;font-weight:600;color:var(--g600)">🏫 '+S.roomInfo.schoolName+' — '+S.roomInfo.teacher+'</p></div>':'')+'<button class="btn-main" onclick="checkCode()" style="margin-bottom:12px">🔍 Kiểm tra mã phòng</button>'+(S.roomInfo?'<button class="btn-main" onclick="S.phase=\'login\';render();" style="background:linear-gradient(135deg,var(--g600),var(--t600));margin-bottom:12px">🚀 Tiếp tục nhập thông tin</button>':'')+'<button style="width:100%;padding:14px;border-radius:14px;font-size:16px;font-weight:800;color:var(--t600);background:var(--t50);border:2px solid var(--t200);display:flex;align-items:center;justify-content:center;gap:8px" onclick="S.phase=\'scoreCheck\';render();">📊 Xem điểm bài thi</button></div></div>';
}

function checkCode(){var code=(document.getElementById('f-code').value||'').trim().toUpperCase();if(!code){showToast('⚠️ Nhập mã phòng!');return;}S.roomCode=code;showToast('🔍 Đang kiểm tra...');fetch(API+'?action=checkCode&code='+encodeURIComponent(code)).then(function(r){return r.json();}).then(function(d){if(d.valid){S.roomInfo=d;showToast('✅ Tìm thấy!');}else{S.roomInfo=null;showToast('❌ '+(d.error||'Mã không hợp lệ'));}render();}).catch(function(e){showToast('⚠️ '+e.message);});}

function renderLogin(el){
  el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:8px">'+B(60)+'</div><div style="padding:10px 14px;background:var(--g50);border-radius:12px;border:2px solid var(--g200);margin-bottom:16px"><p style="font-size:14px;font-weight:800;color:var(--g700)">🏫 '+S.roomInfo.schoolName+'</p><p style="font-size:13px;font-weight:600;color:var(--g600)">Mã phòng: <b style="font-family:var(--fd)">'+S.roomCode+'</b></p></div><p style="font-size:13px;font-weight:700;color:var(--x500);margin-bottom:8px">Nhập thông tin của em:</p><input class="input-field" id="f-ma" placeholder="Mã học sinh (VD: HS001)" value="'+S.student.maHS+'"><input class="input-field" id="f-ten" placeholder="Họ và tên" value="'+S.student.hoTen+'"><input class="input-field" id="f-lop" placeholder="Lớp (VD: 3A)" value="'+S.student.lop+'"><button class="btn-main" onclick="doLogin()">🚀 Vào phòng thi</button><button style="margin-top:8px;padding:10px;border-radius:10px;font-weight:700;color:var(--x500);background:var(--x100);width:100%" onclick="S.phase=\'enterCode\';render();">← Đổi mã phòng</button></div></div>';
}

function doLogin(){var ma=(document.getElementById('f-ma').value||'').trim(),ten=(document.getElementById('f-ten').value||'').trim(),lop=(document.getElementById('f-lop').value||'').trim();if(!ma||!ten){showToast('⚠️ Nhập Mã HS và Họ tên!');return;}S.student={maHS:ma,hoTen:ten,lop:lop};S.phase='loading';render();fetch(API+'?action=getExam&code='+encodeURIComponent(S.roomCode)).then(function(r){return r.json();}).then(function(d){if(d.error){showToast('❌ '+d.error);S.phase='enterCode';render();return;}S.exam=d.exam;S.config=d.config||{};S.timeLeft=(S.config.duration||2400);S.phase='lobby';render();}).catch(function(e){showToast('⚠️ '+e.message);S.phase='enterCode';render();});}

function renderLobby(el){var qs=S.exam.questions,tnC=qs.filter(function(q){return q.cat==='tn';}).length,tlC=qs.filter(function(q){return q.cat==='tl';}).length;
el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:6px">'+B(80)+'</div><div style="font-size:13px;font-weight:700;color:var(--g600);text-transform:uppercase">'+(S.config.schoolName||'')+'</div><h1 class="hd" style="font-size:22px;color:var(--g800);margin-bottom:4px">'+(S.exam.title||'Bài Kiểm Tra')+'</h1><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0 12px"><span style="font-size:12px;font-weight:800;color:var(--g700);background:var(--g100);padding:4px 12px;border-radius:99px;border:2px solid var(--g300);font-family:var(--fd)">'+S.roomCode+'</span><span style="font-size:12px;font-weight:700;color:var(--g700);background:var(--g50);padding:4px 12px;border-radius:99px;border:1px solid var(--g200)">🧒 '+S.student.hoTen+'</span></div><div class="stat-grid"><div class="stat-card" style="background:var(--t50);border-color:var(--t200)"><div style="font-size:22px">📋</div><div class="stat-num" style="color:var(--t600)">'+tnC+'</div><div class="stat-label" style="color:var(--t600)">TN</div></div><div class="stat-card" style="background:var(--r50);border-color:var(--r100)"><div style="font-size:22px">📝</div><div class="stat-num" style="color:var(--r500)">'+tlC+'</div><div class="stat-label" style="color:var(--r500)">TL</div></div><div class="stat-card" style="background:var(--g50);border-color:var(--g200)"><div style="font-size:22px">⏰</div><div class="stat-num" style="color:var(--g700)">'+Math.floor((S.config.duration||2400)/60)+'</div><div class="stat-label" style="color:var(--g700)">Phút</div></div></div><button class="btn-main" onclick="startExam()" style="animation:pulse2 2s ease-in-out infinite">🚀 Bắt Đầu!</button><p style="font-size:12px;margin-top:10px;font-weight:700;color:var(--g700)">🐝 Ong vàng cùng em làm bài nhé!</p></div></div>';}

function startExam(){S.phase='exam';S.timeLeft=S.config.duration||2400;S.exam.questions.forEach(function(q){S.qState[q.id]='locked';});S.timer=setInterval(function(){S.timeLeft--;if(S.timeLeft<=0){clearInterval(S.timer);submitAll();}else{var e=document.getElementById('td');if(e)e.textContent=fmt(S.timeLeft);var b=document.getElementById('tb');if(b)b.className='timer-box '+(S.timeLeft<60?'timer-danger':S.timeLeft<300?'timer-warn':'timer-ok');}},1000);render();}
function subCnt(){return S.exam.questions.filter(function(q){return S.qState[q.id]==='submitted';}).length;}
function actQ(id){S.qState[id]='active';render();setTimeout(function(){var e=document.getElementById('qc-'+id);if(e)e.scrollIntoView({behavior:'smooth',block:'center'});},100);}
function subQ(id){S.qState[id]='submitted';render();}
function submitAll(){clearInterval(S.timer);S.exam.questions.forEach(function(q){S.qState[q.id]='submitted';});S.phase='submitting';render();fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'submitExam',roomCode:S.roomCode,maHS:S.student.maHS,hoTen:S.student.hoTen,lop:S.student.lop,answers:S.answers,essayTexts:S.essayTexts})}).then(function(r){return r.json();}).then(function(d){S.scores.tn=d.tnScore||0;S.scores.tnTotal=d.tnTotal||0;S.scores.details=d.details||[];S.phase='result';render();fireConfetti();}).catch(function(e){S.phase='result';render();fireConfetti();showToast('⚠️ '+e.message);});}

function renderExam(el){var qs=S.exam.questions,tnQs=qs.filter(function(q){return q.cat==='tn';}),tlQs=qs.filter(function(q){return q.cat==='tl';});var pct=(subCnt()/qs.length)*100,tc=S.timeLeft<60?'timer-danger':S.timeLeft<300?'timer-warn':'timer-ok';
var h='<div style="min-height:100vh;background:linear-gradient(180deg,var(--g50),var(--t50))"><div class="exam-hdr"><div style="max-width:800px;margin:0 auto"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:8px"><div style="animation:wiggle 2s ease-in-out infinite">'+B(26)+'</div><span class="hd" style="font-size:13px;color:var(--g800)">'+(S.exam.title||'')+'</span><span style="font-size:10px;font-weight:800;color:var(--g600);background:var(--g100);padding:2px 8px;border-radius:6px;font-family:var(--fd)">'+S.roomCode+'</span></div><div id="tb" class="timer-box '+tc+'">🕐 <span id="td">'+fmt(S.timeLeft)+'</span></div></div><div class="prog-wrap"><div class="prog-fill" style="width:'+Math.max(pct,3)+'%"></div><div class="prog-bee" style="left:calc('+Math.min(pct,93)+'% - 12px)">'+B(22)+'</div></div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:12px;font-weight:700;color:var(--g700)">🌻 '+subCnt()+'/'+qs.length+'</span><span style="font-size:12px;font-weight:700;color:var(--g700)">🧒 '+S.student.hoTen+'</span></div></div></div><div class="exam-body">';
if(tnQs.length){h+='<div class="section-title">📋 Trắc Nghiệm</div>';tnQs.forEach(function(q){h+=renderQ(q);});}
if(tlQs.length){h+='<div class="section-title">📝 Tự Luận</div>';tlQs.forEach(function(q){h+=renderQ(q);});}
h+='</div><div class="submit-bar"><span style="font-size:14px;font-weight:700;color:var(--g700)">✅ '+subCnt()+'/'+qs.length+'</span><button style="padding:14px 32px;border-radius:14px;font-size:17px;font-weight:800;color:white;background:linear-gradient(135deg,var(--g500),var(--g600))" onclick="submitAll()">📨 Nộp Bài</button></div></div>';el.innerHTML=h;}

function renderQ(q){var st=S.qState[q.id]||'locked',isTN=q.cat==='tn',subL={mcq:'Chọn ĐA',true_false:'Đ/S',fill_in:'Điền',essay:'Tự luận'};
var cls='qcard';if(st==='active')cls+=' active';if(st==='submitted')cls+=' submitted';
var c='<div class="'+cls+'" id="qc-'+q.id+'"><div class="qcard-header"><div><span class="badge '+(isTN?'badge-tn':'badge-tl')+'">'+(isTN?'TN':'TL')+' '+q.order+'</span><span class="badge" style="background:var(--s100);color:var(--s500);font-size:10px">'+(subL[q.type]||'')+'</span><span class="badge badge-pts">'+q.points+'đ</span>'+(st==='submitted'?'<span class="badge badge-done">✓</span>':'')+'</div>';
if(st==='locked')c+='<button class="btn-do" onclick="actQ(\''+q.id+'\')">📖 Làm</button>';
else if(st==='active')c+='<button class="btn-submit-q" onclick="subQ(\''+q.id+'\')">📨 Nộp</button>';
else c+='<button class="btn-submitted" onclick="actQ(\''+q.id+'\')">✏️ Sửa</button>';
c+='</div>';
if(q.type==='fill_in'&&st==='active'){var parts=q.content.split('_____'),val=S.answers[q.id]||'';c+='<div class="qcard-qtext">'+parts.map(function(p,i){if(i<parts.length-1)return renderFrac(p)+'<input type="text" class="fill-input" value="'+val+'" placeholder="?" oninput="S.answers[\''+q.id+'\']=this.value">';return renderFrac(p);}).join('')+'</div>';}
else c+='<div class="qcard-qtext">'+renderFrac(q.content)+'</div>';
if(q.image)c+='<div style="padding:8px 20px"><img src="'+q.image+'" style="max-width:300px;border-radius:12px;border:2px solid var(--g200)"></div>';
c+='<div class="qcard-answer">';
if(q.type==='mcq'&&q.options){var lbl=['A','B','C','D'],cols=['#0D9488','#10B981','#0EA5E9','#F59E0B'];c+=q.options.map(function(o,i){var sel=S.answers[q.id]===o.id;return'<button class="opt-btn '+(sel?'selected':'')+'" onclick="S.answers[\''+q.id+'\']=\''+o.id+'\';render();"><span class="opt-label" style="background:'+(sel?cols[i]:'var(--x400)')+'">'+lbl[i]+'</span><span>'+renderFrac(o.text)+'</span>'+(sel?'<span style="margin-left:auto;color:var(--g500);font-weight:800">✓</span>':'')+'</button>';}).join('');}
if(q.type==='true_false'){var sT=S.answers[q.id]==='true',sF=S.answers[q.id]==='false';c+='<div class="tf-btns"><button class="tf-btn '+(sT?'sel-t':'')+'" onclick="S.answers[\''+q.id+'\']=\'true\';render();">✅ Đúng</button><button class="tf-btn '+(sF?'sel-f':'')+'" onclick="S.answers[\''+q.id+'\']=\'false\';render();">❌ Sai</button></div>';}
if(q.type==='essay')c+='<textarea class="essay-textarea" placeholder="✍️ Nhập bài làm..." oninput="S.essayTexts[\''+q.id+'\']=this.value">'+(S.essayTexts[q.id]||'')+'</textarea><button style="margin-top:10px;width:100%;padding:14px;border-radius:14px;border:3px dashed var(--g300);font-size:15px;font-weight:700;background:var(--g50);color:var(--g700)" onclick="showToast(\'📸 Tính năng tải ảnh sẽ cập nhật sau\')">📸 Tải ảnh bài làm nếu ghi trên giấy</button>';
c+='</div></div>';return c;}

function renderResult(el){var pct=S.scores.tnTotal?Math.round((S.scores.tn/S.scores.tnTotal)*100):0,stars=pct>=80?3:pct>=50?2:1;
el.innerHTML='<div class="wrap"><div class="card" style="animation:bounceIn .8s ease-out"><div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:6px">'+B(70)+'</div><h2 class="hd" style="font-size:26px;color:var(--g800);margin-bottom:4px">Nộp bài thành công!</h2><p style="font-weight:700;color:var(--g700);margin-bottom:14px">🎉 '+S.student.hoTen+' đã hoàn thành!</p><div style="display:flex;justify-content:center;gap:8px;margin-bottom:14px">'+[1,2,3].map(function(i){return'<span style="font-size:40px;'+(i<=stars?'animation:starPop .5s ease '+i*.2+'s both':'opacity:.2')+'">⭐</span>';}).join('')+'</div><div style="border-radius:16px;padding:20px;margin-bottom:12px;background:linear-gradient(135deg,var(--g50),var(--t50));border:2px solid var(--g200)"><div style="font-size:13px;font-weight:700;color:var(--g700)">Điểm TN</div><div class="score-num">'+S.scores.tn+'/'+S.scores.tnTotal+'</div></div>'+(S.scores.details&&S.scores.details.length?'<div style="margin-bottom:12px;padding:12px;background:var(--g50);border-radius:12px;border:1px solid var(--g200);text-align:left"><p style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:4px">Chi tiết:</p><p style="font-size:13px;font-weight:600;color:var(--x700)">'+S.scores.details.join(' | ')+'</p></div>':'')+'<div style="border-radius:14px;padding:14px;margin-bottom:16px;background:var(--t50);border:2px solid var(--t200)"><p style="font-size:14px;font-weight:700;color:var(--t600)">📝 Tự luận sẽ được cô chấm sau</p></div><button class="btn-main" onclick="location.reload()" style="background:var(--g100);color:var(--g700)">🏠 Quay về</button></div></div>';}

function renderScoreCheck(el){
  el.innerHTML='<div class="wrap"><div class="card"><div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:8px">'+B(60)+'</div><h2 class="hd" style="font-size:22px;color:var(--g800);margin-bottom:4px">📊 Xem Điểm Bài Thi</h2><p style="font-size:13px;font-weight:600;color:var(--x500);margin-bottom:16px">Nhập mã phòng thi và mã học sinh</p><input class="code-input" id="sc-code" placeholder="ONG-0000" maxlength="8" value="'+S.roomCode+'" style="font-size:24px;padding:14px;margin-bottom:8px"><input class="input-field" id="sc-mahs" placeholder="Mã học sinh (VD: HS001)" value="'+S.student.maHS+'" style="text-align:center;font-weight:700"><button class="btn-main" onclick="doCheckScore()" style="margin-bottom:12px;background:linear-gradient(135deg,var(--t500),var(--s500))">📊 Tra cứu điểm</button><button style="width:100%;padding:12px;border-radius:12px;font-weight:700;color:var(--x500);background:var(--x100)" onclick="S.phase=\'enterCode\';render();">← Quay lại</button></div></div>';
}

function doCheckScore(){var code=(document.getElementById('sc-code').value||'').trim().toUpperCase(),maHS=(document.getElementById('sc-mahs').value||'').trim();if(!code||!maHS){showToast('⚠️ Nhập mã phòng và mã HS!');return;}S.roomCode=code;S.student.maHS=maHS;showToast('🔍 Đang tra cứu...');fetch(API+'?action=getResults&code='+encodeURIComponent(code)).then(function(r){return r.json();}).then(function(data){if(!Array.isArray(data)||!data.length){showToast('📭 Chưa có kết quả');return;}var found=data.filter(function(r){return r.maHS===maHS;});if(!found.length){showToast('❌ Không tìm thấy mã "'+maHS+'"');return;}S.scoreData=found[0];S.phase='scoreResult';render();}).catch(function(e){showToast('⚠️ '+e.message);});}

function renderScoreResult(el){var r=S.scoreData,sc=r.total||r.tnScore||0,grade=sc>=9?'Giỏi':sc>=7?'Khá':sc>=5?'TB':'Yếu',stars=sc>=9?3:sc>=7?2:sc>=5?1:0,details=(r.tnDetail||'').split(' | ');
el.innerHTML='<div class="wrap"><div class="card" style="animation:bounceIn .8s ease-out"><div style="animation:floatBee 3s ease-in-out infinite;display:flex;justify-content:center;margin-bottom:6px">'+B(70)+'</div><h2 class="hd" style="font-size:22px;color:var(--g800);margin-bottom:2px">Kết Quả Bài Thi</h2><p style="font-weight:700;color:var(--g600);margin-bottom:4px">'+r.hoTen+' — '+r.maHS+' — '+r.lop+'</p><p style="font-size:12px;font-weight:600;color:var(--x400);margin-bottom:14px">'+(r.school||'')+' | '+S.roomCode+'</p><div style="display:flex;justify-content:center;gap:8px;margin-bottom:14px">'+[1,2,3].map(function(i){return'<span style="font-size:40px;'+(i<=stars?'animation:starPop .5s ease '+i*.2+'s both':'opacity:.2')+'">⭐</span>';}).join('')+'</div><div style="border-radius:16px;padding:20px;margin-bottom:14px;background:linear-gradient(135deg,var(--g50),var(--t50));border:2px solid var(--g200)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:14px;font-weight:700;color:var(--g700)">Điểm TN</span><span style="font-family:var(--fd);font-size:24px;font-weight:900;color:var(--g700)">'+r.tnScore+'/'+r.tnTotal+'</span></div>'+(r.tlScore?'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:14px;font-weight:700;color:var(--t600)">Điểm TL</span><span style="font-family:var(--fd);font-size:24px;font-weight:900;color:var(--t600)">'+r.tlScore+'</span></div>':'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:14px;font-weight:700;color:var(--t600)">Điểm TL</span><span style="font-size:13px;font-weight:700;color:var(--a600);background:var(--a50);padding:4px 10px;border-radius:8px">⏳ Chưa chấm</span></div>')+'<div style="border-top:2px solid var(--g200);padding-top:8px;display:flex;justify-content:space-between;align-items:center"><span style="font-weight:800;color:var(--g800)">TỔNG</span><span style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--g700)">'+sc+'</span></div></div><div style="margin-bottom:14px"><span style="display:inline-block;padding:6px 24px;border-radius:99px;font-size:16px;font-weight:900;'+(sc>=9?'background:var(--g100);color:var(--g700)':sc>=7?'background:var(--s100);color:var(--s500)':sc>=5?'background:var(--a50);color:var(--a600)':'background:var(--r50);color:var(--r500)')+'">'+grade+'</span></div>'+(details.length>1?'<div style="text-align:left;padding:12px;background:var(--g50);border-radius:12px;border:1px solid var(--g200);margin-bottom:14px"><p style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:6px">📋 Chi tiết:</p><div style="display:flex;flex-wrap:wrap;gap:6px">'+details.map(function(d){var ok=d.indexOf('✓')>=0;return'<span style="padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;'+(ok?'background:var(--g100);color:var(--g700)':'background:var(--r50);color:var(--r500)')+'">'+d.trim()+'</span>';}).join('')+'</div></div>':'')+'<p style="font-size:11px;color:var(--x400);margin-bottom:14px">🕐 Nộp: '+r.time+'</p><button class="btn-main" onclick="S.phase=\'enterCode\';render();" style="background:var(--g100);color:var(--g700)">🏠 Quay về</button></div></div>';}

render();
</script>
<div style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:4px;font-size:10px;font-weight:600;color:var(--x400);background:rgba(255,255,255,.6);z-index:1;pointer-events:none">@2026 Thiết kế - Chung Trần 0913 031 073</div>
